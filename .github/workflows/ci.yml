name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Run pre-commit hooks
        run: uv run --no-project --with pre-commit pre-commit run --all-files --show-diff-on-failure

  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --all-targets

  abi3-wheel:
    name: Build and audit abi3 wheel
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: x86_64
          args: --release --locked --out dist --interpreter python3.11
          manylinux: "2014"
          sccache: true

      - name: Install abi3audit
        run: python -m pip install --disable-pip-version-check "abi3audit==0.0.26"

      - name: Audit stable ABI compatibility
        run: python -m abi3audit --strict --summary dist/*.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: abi3-wheel-linux-x86_64
          path: dist/*.whl
          if-no-files-found: error

  abi3-wheel-smoke:
    name: Smoke abi3 wheel (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: abi3-wheel
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: abi3-wheel-linux-x86_64
          path: dist

      - name: Smoke test wheel install
        run: python scripts/install_wheel_smoke.py --dist-dir dist

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Build extension in place
        run: uv run --extra dev --with "maturin>=1.7,<2" maturin develop --locked --skip-install

      - name: Run tests
        if: matrix.python-version != '3.14'
        run: uv run --extra dev pytest -vv

      - name: Run tests with coverage
        if: matrix.python-version == '3.14'
        run: uv run --extra dev coverage run -m pytest -vv

      - name: Report coverage
        if: matrix.python-version == '3.14'
        run: uv run --extra dev coverage report -m
